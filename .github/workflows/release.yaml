name: Release to latest/edge

on:
  push:
    branches:
      - main

jobs:
  ci-tests:
    name: Tests
    uses: ./.github/workflows/ci.yaml
    secrets: inherit
    permissions: {}

  release-libs:
    name: Release bumped library
    runs-on: ubuntu-24.04
    permissions: {}
    needs:
      - ci-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install charmcraft
        run: sudo snap install charmcraft --classic
      - name: Install noctua
        run: pipx install git+https://github.com/lucabello/noctua
      - name: Release bumped charm library
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMHUB_TOKEN }}
        run: noctua charm libraries publish

  release:
    name: Release charm
    needs:
      - ci-tests
    uses: canonical/data-platform-workflows/.github/workflows/release_charm_edge.yaml@v48.1.2
    with:
      track: latest
      artifact-prefix: ${{ needs.ci-tests.outputs.artifact-prefix }}
    secrets:
      charmhub-token: ${{ secrets.CHARMHUB_TOKEN }}
    permissions:
      contents: write  # Needed to create GitHub release
